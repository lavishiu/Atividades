<html>
  <head>
    <!-- Na tag head irá os metadados do website. -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scaled=1" />
    <!-- Charset: fornecer um alfabeto para o navegador  -->
    <!-- name=viewport: adaptar o site para todos os dispositivos -->
  </head>
  <body>
    <!-- Aqui vai o que é visivel do website. -->
    <h1>primeira página HTML.</h1>
    <h2>primeira página HTML.</h2>
    <h3>primeira página HTML.</h3>
    <h4>primeira página HTML.</h4>
    <h5>primeira página HTML.</h5>
    <h6>primeira página HTML.</h6>
    <!-- H1 é para titulo, em negrito. -->
  </body>
</html>
